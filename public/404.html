<!doctype html>
<!--
  404 estático para la actividad de Nginx (manual, sección 6.1).
  Nginx lo sirve directo desde /home/benjamin_cota/public/404.html cuando
  try_files termina en =404 — por eso NO depende del bundle de React:
  todo el CSS va inline y los enlaces son absolutos a /benjamin_cota/.
  Vite copia public/ tal cual a dist/, así que llega solo con npm run build.
-->
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <link rel="icon" type="image/png" href="/benjamin_cota/logo-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <title>404 — AUTOCELLS</title>
    <style>
      /* Identidad visual AUTOCELLS (mismos tokens que src/index.css) */
      :root {
        --primary: #2bb3d3;
        --primary-dark: #0e7490;
        --primary-hover: #0b5f78;
        --secondary: #58595b;
        --muted: #6b6d6f;
        --bg: #ffffff;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg);
        color: var(--secondary);
        font-family: "Montserrat", ui-sans-serif, system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        text-align: center;
        padding: 6rem 1rem;
      }
      main {
        max-width: 48rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.5rem;
      }
      .logo-ring {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.625rem;
        border-radius: 9999px;
        border: 4px solid rgba(43, 179, 211, 0.2);
        background: rgba(43, 179, 211, 0.1);
      }
      .logo-plate {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 80px;
        height: 80px;
        padding: 0.375rem;
        border-radius: 9999px;
        border: 1px solid rgba(88, 89, 91, 0.1);
        background: #fff;
      }
      .logo-plate img { width: 100%; height: 100%; object-fit: contain; }
      .code {
        font-size: 4.5rem;
        font-weight: 700;
        letter-spacing: 0.025em;
        color: var(--primary-dark);
        line-height: 1;
      }
      h1 {
        margin-top: 0.75rem;
        font-size: 1.5rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.025em;
      }
      p.desc {
        margin-top: 0.75rem;
        max-width: 65ch;
        color: var(--muted);
        line-height: 1.6;
      }
      p.path {
        margin-top: 0.25rem;
        font-size: 0.75rem;
        color: rgba(107, 109, 111, 0.7);
        word-break: break-all;
      }
      .actions { display: flex; flex-direction: column; gap: 0.75rem; }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        border-radius: 12px;
        padding: 0.625rem 1.25rem;
        font-size: 0.875rem;
        font-weight: 600;
        text-decoration: none;
        transition: background-color 0.15s ease, color 0.15s ease, border-color 0.15s ease;
      }
      .btn-primary { background: var(--primary-dark); color: #fff; }
      .btn-primary:hover { background: var(--primary-hover); }
      .btn-secondary {
        border: 1px solid rgba(88, 89, 91, 0.2);
        color: var(--secondary);
      }
      .btn-secondary:hover { border-color: var(--primary-dark); color: var(--primary-dark); }
      @media (min-width: 640px) {
        h1 { font-size: 1.875rem; }
        .actions { flex-direction: row; }
      }
    </style>
  </head>
  <body>
    <main>
      <span class="logo-ring">
        <span class="logo-plate">
          <img src="/benjamin_cota/logo-icon.png" alt="AUTOCELLS" />
        </span>
      </span>

      <div>
        <p class="code">404</p>
        <h1>Esta línea está fuera de servicio</h1>
        <p class="desc">
          La página que buscas no existe o cambió de dirección. Revisa el enlace o
          vuelve a un lugar conocido.
        </p>
        <p class="path" id="ruta"></p>
      </div>

      <!-- Único enlace seguro: con try_files ... =404, /benjamin_cota/catalogo no es
           archivo físico y volvería a caer en este 404. La raíz sí resuelve a index.html. -->
      <div class="actions">
        <a class="btn btn-primary" href="/benjamin_cota/">Volver al inicio</a>
      </div>
    </main>

    <script>
      document.getElementById('ruta').textContent =
        'Ruta solicitada: ' + window.location.pathname;
    </script>
  </body>
</html>
